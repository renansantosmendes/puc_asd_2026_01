[pytest]
# Configuração do pytest

# Diretório de testes
testpaths = tests

# Padrão de arquivos de teste
python_files = test_*.py

# Padrão de classes de teste
python_classes = Test*

# Padrão de funções de teste
python_functions = test_*

# Mostrar prints durante os testes
addopts = -v -s

# Minimum Python version
minversion = 3.8
